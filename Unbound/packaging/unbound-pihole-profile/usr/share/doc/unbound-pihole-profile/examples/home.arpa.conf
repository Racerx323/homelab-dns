# Disabled example. Copy to /etc/unbound/unbound.conf.d and edit only when
# Unbound has intentionally been selected to own the local home.arpa zone.
server:
    private-domain: "home.arpa"
    domain-insecure: "home.arpa"
    local-zone: "home.arpa." static
    local-data: "router.home.arpa. 300 IN A 192.168.1.1"
    local-data-ptr: "192.168.1.1 router.home.arpa."

