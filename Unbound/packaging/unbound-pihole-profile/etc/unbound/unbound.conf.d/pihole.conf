# Managed by unbound-pihole-profile. Normal dpkg conffile rules apply.
server:
    interface: 127.0.0.1
    interface: ::1
    port: 5335

    access-control: 127.0.0.1 allow
    access-control: ::1 allow

    do-ip4: yes
    do-ip6: yes
    do-udp: yes
    do-tcp: yes
    prefer-ip6: no

    # Debian's root-auto-trust-anchor-file.conf owns the root trust anchor.
    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    qname-minimisation: yes
    minimal-responses: yes
    deny-any: yes
    edns-buffer-size: 1232
    prefetch: yes
    prefetch-key: yes

    # Conservative Raspberry Pi 5 defaults.
    num-threads: 1
    rrset-cache-size: 64m
    msg-cache-size: 32m
    so-reuseport: yes
    so-rcvbuf: 4m
    so-sndbuf: 4m

    # DNS rebinding protection. No private zone or hostname is declared.
    private-address: 10.0.0.0/8
    private-address: 100.64.0.0/10
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: fc00::/7
    private-address: fe80::/10
    private-address: ::ffff:0:0/96

    # Keep generic deployments in journald/syslog.
    use-syslog: yes
    verbosity: 1

dnstap:
    # Compiled support is retained, but telemetry is disabled by default.
    dnstap-enable: no
