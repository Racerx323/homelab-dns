## Validating, caching, and forwarding DNS
## Example location: /etc/unbound/unbound.conf.d/pihole.conf
##
## Public-safe example for Pi-hole + Unbound + keepalived.
## Replace the example domain, hostnames, and addresses before use.

server:
    ## Logging
    logfile: "/var/log/unbound/unbound.log"
    log-time-ascii: yes
    verbosity: 0
    statistics-interval: 0
    statistics-cumulative: no
    extended-statistics: yes

    ## Pi-hole forwards to local Unbound on loopback.
    interface: 127.0.0.1
    interface: ::1
    port: 5335

    do-ip4: yes
    do-ip6: yes
    do-udp: yes
    do-tcp: yes
    prefer-ip6: no

    ## Keep Unbound reachable only from local Pi-hole.
    access-control: 127.0.0.1 allow
    access-control: ::1 allow

    ## DNSSEC and hardening
    harden-glue: yes
    harden-large-queries: no
    harden-dnssec-stripped: yes
    harden-algo-downgrade: no
    harden-short-bufsize: yes
    hide-identity: yes
    identity: "Server"
    hide-version: yes
    do-daemonize: no

    ## Cache behavior
    cache-min-ttl: 0
    cache-max-negative-ttl: 3600
    cache-max-ttl: 86400
    neg-cache-size: 4m
    rrset-roundrobin: yes
    use-caps-for-id: no
    serve-expired: no
    qname-minimisation: yes
    edns-buffer-size: 1232
    infra-cache-numhosts: 50000
    deny-any: yes
    minimal-responses: yes
    prefetch: yes
    prefetch-key: yes

    ## Raspberry Pi 5 example tuning
    num-queries-per-thread: 2048
    num-threads: 4
    msg-cache-slabs: 8
    rrset-cache-slabs: 8
    infra-cache-slabs: 8
    key-cache-slabs: 8
    so-reuseport: yes
    rrset-cache-size: 256m
    msg-cache-size: 128m

    ## If these are enabled, configure matching sysctls:
    ##   net.core.rmem_max >= 4194304
    ##   net.core.wmem_max >= 4194304
    so-rcvbuf: 4m
    so-sndbuf: 4m

    unwanted-reply-threshold: 10000

    ## Quiet logs for normal operation.
    log-queries: no
    log-replies: no
    log-servfail: no
    log-local-actions: no

    ## DNS rebinding protection. Add local domains that may return private IPs.
    private-address: 192.168.0.0/16
    private-address: 172.16.0.0/12
    private-address: 10.0.0.0/8
    private-address: 169.254.0.0/16
    private-address: fd00::/7
    private-address: fe80::/10
    private-address: ::ffff:0:0/96

    ## Use home.arpa for private home networks, or replace with your internal zone.
    private-domain: "home.arpa"
    domain-insecure: "home.arpa"

    ## Required for DNS-over-TLS upstream verification.
    tls-cert-bundle: /etc/ssl/certs/ca-certificates.crt

    ## Local zone example
    local-zone: "home.arpa." static

    ## Example service record.
    local-data: "_smtp._tcp.home.arpa. 180 IN SRV 0 10 8025 mail.home.arpa."

    ## Example HA DNS records:
    ## - dns-vip.home.arpa is the keepalived VIP used by DNS clients.
    ## - dns-node-a and dns-node-b are individual Pi-hole/Unbound nodes.
    local-data: "dns-vip.home.arpa. IN A 10.0.0.10"
    local-data: "dns-node-a.home.arpa. IN A 10.0.0.11"
    local-data: "dns-node-b.home.arpa. IN A 10.0.0.12"

    ## Example internal service records.
    local-data: "gateway.home.arpa. IN A 10.0.0.1"
    local-data: "ntp.home.arpa. IN A 10.0.0.20"
    local-data: "mail.home.arpa. IN A 10.0.1.10"
    local-data: "monitoring.home.arpa. IN A 10.0.1.11"

    ## Example PTR records.
    local-data-ptr: "10.0.0.10 dns-vip.home.arpa."
    local-data-ptr: "10.0.0.11 dns-node-a.home.arpa."
    local-data-ptr: "10.0.0.12 dns-node-b.home.arpa."
    local-data-ptr: "10.0.0.1 gateway.home.arpa."
    local-data-ptr: "10.0.0.20 ntp.home.arpa."
    local-data-ptr: "10.0.1.10 mail.home.arpa."
    local-data-ptr: "10.0.1.11 monitoring.home.arpa."

## DNS-over-TLS forwarding example.
forward-zone:
    name: "."
    forward-tls-upstream: yes
    forward-first: yes
    forward-addr: 1.1.1.1@853#cloudflare-dns.com
    forward-addr: 1.0.0.1@853#cloudflare-dns.com
    forward-addr: 2606:4700:4700::1111@853#cloudflare-dns.com
    forward-addr: 2606:4700:4700::1001@853#cloudflare-dns.com

## DNSTAP optional observability profile.
## Disabled by default because full capture is verbose.
dnstap:
    dnstap-enable: no
    dnstap-socket-path: "/run/unbound/dnstap.sock"
    dnstap-send-identity: yes
    dnstap-send-version: yes
    dnstap-log-resolver-query-messages: yes
    dnstap-log-resolver-response-messages: yes
    dnstap-log-client-query-messages: yes
    dnstap-log-client-response-messages: yes
    dnstap-log-forwarder-query-messages: yes
    dnstap-log-forwarder-response-messages: yes
